name: Tests

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=shared --cov=services --cov-report=xml --cov-report=term-missing -m "not slow"

      - name: Run integration tests
        run: |
          pytest tests/integration -v --cov=shared --cov=services --cov-report=term-missing --cov-append
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Generate coverage report
        run: |
          pytest --cov=shared --cov=services --cov-report=html --cov-report=term-missing
          echo "Coverage report generated in htmlcov/"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run black
        run: black --check services/ shared/ subagents/ hooks/ plugins/ tests/

      - name: Run isort
        run: isort --check-only services/ shared/ subagents/ hooks/ plugins/ tests/

      - name: Run ruff
        run: ruff check services/ shared/ subagents/ hooks/ plugins/ tests/

      - name: Run mypy
        run: mypy services shared subagents hooks plugins --ignore-missing-imports
        continue-on-error: true
